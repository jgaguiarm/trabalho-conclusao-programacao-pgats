# CI de Nível 2 - Execução Agendada

# Nome da Pipeline
name: 'CI de Nível 2 - Execução Agendada'

# Gatilhos/Triggers - Regras de Disparo
# Gatilho Manual
on: 
  schedule:
    # Cronograma de Execução
    # 1- minuto, 2- hora, 3- dia do mês, 4- mês, 5- dia da semana 
    - cron: '*/5 * * * * '
      

#Tarefas dentro da Pipeline
jobs:
    #Nome do Job
    unit-tests:
        # Máquina onde os testes irão rodar
        runs-on: ubuntu-latest

        # Passos do job
        steps:
          # Clone do Projeto
          - uses: actions/checkout@v4

          # Instalação do Node
          - uses: actions/setup-node@v4
            with:
              node-version: 24.x

          # Instalação do Mocha
          - name: Instalando o Mocha
            run: npm i mocha

          # Executar os testes unitários
          - name: Executando os testes unitátios
            run: npx mocha
          



